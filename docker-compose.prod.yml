services:
  # ==========================================
  # Frontend Web (React + Nginx) - Producción
  # ==========================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: rag_fds_frontend_prod
    ports:
      - "80:80"
    env_file:
      - ./apps/frontend/.env
    restart: unless-stopped